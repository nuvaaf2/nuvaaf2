const https = require('https');
const fs = require('fs');

const token = process.env.GITHUB_TOKEN;
const username = process.env.USERNAME;

function graphql(query) {
  return new Promise((resolve, reject) => {
    const data = JSON.stringify({ query });
    const options = {
      hostname: 'api.github.com',
      path: '/graphql',
      method: 'POST',
      headers: {
        'Authorization': 'bearer ' + token,
        'Content-Type': 'application/json',
        'User-Agent': 'github-stats-action'
      }
    };
    const req = https.request(options, res => {
      let body = '';
      res.on('data', d => body += d);
      res.on('end', () => resolve(JSON.parse(body)));
    });
    req.on('error', reject);
    req.write(data);
    req.end();
  });
}

async function main() {
  const result = await graphql(`{
    user(login: "${username}") {
      contributionsCollection {
        totalCommitContributions
        totalPullRequestContributions
        totalIssueContributions
      }
      repositories(first: 100, ownerAffiliations: OWNER, isFork: false) {
        nodes { stargazerCount primaryLanguage { name } }
      }
      followers { totalCount }
    }
  }`);

  if (result.errors) {
    console.error('GraphQL errors:', JSON.stringify(result.errors));
    process.exit(1);
  }

  const user = result.data.user;
  const contrib = user.contributionsCollection;
  const repos = user.repositories.nodes;
  const stars = repos.reduce((acc, r) => acc + r.stargazerCount, 0);
  const commits = contrib.totalCommitContributions;
  const prs = contrib.totalPullRequestContributions;
  const issues = contrib.totalIssueContributions;
  const followers = user.followers.totalCount;

  const langMap = {};
  repos.forEach(r => {
    if (r.primaryLanguage) {
      langMap[r.primaryLanguage.name] = (langMap[r.primaryLanguage.name] || 0) + 1;
    }
  });
  const langs = Object.entries(langMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const totalLangRepos = Math.max(langs.reduce((a, b) => a + b[1], 0), 1);

  fs.mkdirSync('stats', { recursive: true });

  // STATS SVG
  const statsSvg = [
    '<svg width="495" height="195" xmlns="http://www.w3.org/2000/svg">',
    '<rect width="495" height="195" rx="10" fill="#020818"/>',
    '<text x="25" y="35" fill="#38bdf8" font-size="16" font-weight="bold" font-family="monospace">GitHub Stats — ' + username + '</text>',
    '<line x1="25" y1="45" x2="470" y2="45" stroke="#1e3a5f" stroke-width="1"/>',
    '<text x="25" y="78" fill="#64748b" font-size="13" font-family="monospace">Total Stars</text>',
    '<text x="460" y="78" fill="#e2e8f0" font-size="13" font-family="monospace" text-anchor="end">' + stars + '</text>',
    '<text x="25" y="108" fill="#64748b" font-size="13" font-family="monospace">Total Commits (this year)</text>',
    '<text x="460" y="108" fill="#e2e8f0" font-size="13" font-family="monospace" text-anchor="end">' + commits + '</text>',
    '<text x="25" y="138" fill="#64748b" font-size="13" font-family="monospace">Pull Requests</text>',
    '<text x="460" y="138" fill="#e2e8f0" font-size="13" font-family="monospace" text-anchor="end">' + prs + '</text>',
    '<text x="25" y="168" fill="#64748b" font-size="13" font-family="monospace">Issues Opened</text>',
    '<text x="460" y="168" fill="#e2e8f0" font-size="13" font-family="monospace" text-anchor="end">' + issues + '</text>',
    '</svg>'
  ].join('\n');
  fs.writeFileSync('stats/stats.svg', statsSvg);
  console.log('stats.svg done');

  // LANGS SVG
  const barColors = ['#38bdf8', '#0ea5e9', '#0284c7', '#0369a1', '#075985'];
  let langItems = [];
  let yPos = 70;
  langs.forEach(([lang, count], i) => {
    const pct = Math.round((count / totalLangRepos) * 100);
    const barW = Math.round((count / totalLangRepos) * 300);
    langItems.push('<text x="25" y="' + yPos + '" fill="#e2e8f0" font-size="12" font-family="monospace">' + lang + '</text>');
    langItems.push('<text x="345" y="' + yPos + '" fill="#64748b" font-size="12" font-family="monospace" text-anchor="end">' + pct + '%</text>');
    langItems.push('<rect x="25" y="' + (yPos + 6) + '" width="300" height="6" rx="3" fill="#1e3a5f"/>');
    langItems.push('<rect x="25" y="' + (yPos + 6) + '" width="' + barW + '" height="6" rx="3" fill="' + barColors[i] + '"/>');
    yPos += 35;
  });

  const langsSvg = [
    '<svg width="380" height="' + (yPos + 20) + '" xmlns="http://www.w3.org/2000/svg">',
    '<rect width="380" height="' + (yPos + 20) + '" rx="10" fill="#020818"/>',
    '<text x="25" y="35" fill="#38bdf8" font-size="16" font-weight="bold" font-family="monospace">Top Languages</text>',
    '<line x1="25" y1="45" x2="355" y2="45" stroke="#1e3a5f" stroke-width="1"/>',
    langItems.join('\n'),
    '</svg>'
  ].join('\n');
  fs.writeFileSync('stats/langs.svg', langsSvg);
  console.log('langs.svg done');

  // STREAK SVG
  const streakSvg = [
    '<svg width="495" height="150" xmlns="http://www.w3.org/2000/svg">',
    '<rect width="495" height="150" rx="10" fill="#020818"/>',
    '<text x="247" y="35" fill="#38bdf8" font-size="16" font-weight="bold" font-family="monospace" text-anchor="middle">Contribution Overview</text>',
    '<line x1="25" y1="45" x2="470" y2="45" stroke="#1e3a5f" stroke-width="1"/>',
    '<text x="90" y="95" fill="#38bdf8" font-size="26" font-weight="bold" font-family="monospace" text-anchor="middle">' + commits + '</text>',
    '<text x="90" y="120" fill="#64748b" font-size="11" font-family="monospace" text-anchor="middle">Commits / Year</text>',
    '<line x1="165" y1="55" x2="165" y2="135" stroke="#1e3a5f" stroke-width="1"/>',
    '<text x="247" y="88" fill="#38bdf8" font-size="22" font-weight="bold" font-family="monospace" text-anchor="middle">' + stars + '</text>',
    '<text x="247" y="113" fill="#64748b" font-size="11" font-family="monospace" text-anchor="middle">Total Stars</text>',
    '<line x1="330" y1="55" x2="330" y2="135" stroke="#1e3a5f" stroke-width="1"/>',
    '<text x="410" y="95" fill="#38bdf8" font-size="26" font-weight="bold" font-family="monospace" text-anchor="middle">' + followers + '</text>',
    '<text x="410" y="120" fill="#64748b" font-size="11" font-family="monospace" text-anchor="middle">Followers</text>',
    '</svg>'
  ].join('\n');
  fs.writeFileSync('stats/streak.svg', streakSvg);
  console.log('streak.svg done');

  console.log('All done! stars=' + stars + ' commits=' + commits + ' prs=' + prs);
}

main().catch(e => { console.error(e); process.exit(1); });
