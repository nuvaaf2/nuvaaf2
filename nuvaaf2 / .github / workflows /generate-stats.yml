name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 */6 * * *"      # runs every 6 hours automatically
  workflow_dispatch:             # run manually anytime from Actions tab
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create stats folder
        run: mkdir -p stats

      # ── Stats Card ──────────────────────────────────────────────────
      - name: Generate stats card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: nuvaaf2
          output_file: stats/stats.svg
          args: >
            show_icons=true
            theme=tokyonight
            include_all_commits=true
            count_private=true
            hide_border=true
            bg_color=020818
            title_color=38bdf8
            icon_color=38bdf8
            text_color=64748b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Top Languages Card ──────────────────────────────────────────
      - name: Generate top languages card
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: nuvaaf2
          output_file: stats/langs.svg
          card_type: top_langs
          args: >
            layout=compact
            theme=tokyonight
            hide_border=true
            bg_color=020818
            title_color=38bdf8
            text_color=64748b
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Streak Card ─────────────────────────────────────────────────
      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: nuvaaf2
          output_file: stats/streak.svg
          theme: tokyonight
          hide_border: true
          background: "020818"
          ring: "38bdf8"
          fire: "38bdf8"
          currStreakLabel: "38bdf8"
          sideLabels: "64748b"
          dates: "64748b"
          sideNums: "38bdf8"
          currStreakNum: "38bdf8"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Commit generated SVGs back to repo ──────────────────────────
      - name: Commit stats SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "chore: auto-update github stats [skip ci]"
          git push
