name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create stats folder
        run: mkdir -p stats

      - name: Download stats card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=nuvaaf2&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=020818&title_color=38bdf8&icon_color=38bdf8&text_color=64748b" \
            -o stats/stats.svg
          echo "Stats card downloaded"

      - name: Download top languages card
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=nuvaaf2&layout=compact&theme=tokyonight&hide_border=true&bg_color=020818&title_color=38bdf8&text_color=64748b" \
            -o stats/langs.svg
          echo "Languages card downloaded"

      - name: Download streak card
        run: |
          curl -s "https://nirzak-streak-stats.vercel.app?user=nuvaaf2&theme=tokyonight&hide_border=true&background=020818&ring=38bdf8&fire=38bdf8&currStreakLabel=38bdf8&sideLabels=64748b&dates=64748b&sideNums=38bdf8&currStreakNum=38bdf8" \
            -o stats/streak.svg
          echo "Streak card downloaded"

      - name: Commit SVGs to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "chore: auto-update github stats [skip ci]"
          git push
